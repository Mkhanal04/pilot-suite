// --- SCROLL REVEAL ---
function useReveal(dep) {
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("revealed"); io.unobserve(e.target); } }),
      { threshold: 0.08, rootMargin: "0px 0px -30px 0px" }
    );
    // Inline viewport check: reveal immediately if already visible, otherwise hide and observe
    document.querySelectorAll("[data-reveal]").forEach((el) => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add("revealed");
      } else if (!el.classList.contains("revealed")) {
        io.observe(el);
      }
    });
    // Safety net: force-reveal any still-hidden elements after 1.5s (fixes mobile where
    // IntersectionObserver may not fire due to layout differences at narrow viewports)
    const safetyTimer = setTimeout(() => {
      document.querySelectorAll("[data-reveal]").forEach((el) => {
        if (!el.classList.contains("revealed")) {
          el.classList.add("revealed");
        }
      });
    }, 1500);
    return () => { io.disconnect(); clearTimeout(safetyTimer); };
  }, [dep]);
}

function R({ children, delay = 0, style = {} }) {
  return <div data-reveal style={{ transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}s`, ...style }}>{children}</div>;
}

}

// --- LIVE APP PREVIEW (iframe embed) ---
function LiveAppPreview({ appUrl, t, color, isMobile, title }) {
  const [loaded, setLoaded] = useState(false);
  const containerH = isMobile ? 260 : 400;
  // iPad landscape dimensions — readable at thumbnail scale without being too small
  const iframeW = 1024;
  const iframeH = 768;
  // Scale to fit container width (container is ~1080px max, minus padding)
  const scaleVal = isMobile ? 0.34 : 0.62;

  return (
    <div style={{ width: "100%", borderRadius: 12, overflow: "hidden", border: `1px solid ${t.border}`, boxShadow: "0 8px 32px rgba(0,0,0,0.18)" }}>
      {/* Browser chrome bar */}
      <div style={{ height: 32, background: t.bg3, borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", padding: "0 12px", gap: 6 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: t.t3 }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: t.t3 }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: t.t3 }} />
        <div style={{ flex: 1, height: 16, background: t.bg2, borderRadius: 4, marginLeft: 8, marginRight: 8 }} />
      </div>
      {/* Iframe container */}
      <div style={{ width: "100%", height: containerH, position: "relative", overflow: "hidden", background: t.bg2 }}>
        {/* Loading skeleton */}
        {!loaded && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12, zIndex: 1 }}>
            <div style={{ width: 40, height: 40, borderRadius: 8, background: `linear-gradient(135deg, ${color}30, ${color}10)`, border: `1px solid ${color}25`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: color, fontWeight: 600 }}>{title ? title.substring(0,2).toUpperCase() : "AP"}</span>
            </div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: t.t2, letterSpacing: "0.1em", textTransform: "uppercase" }}>Loading preview...</span>
          </div>
        )}
        {/* Scaled iframe */}
        <div style={{
          width: iframeW, height: iframeH,
          transform: `scale(${scaleVal})`,
          transformOrigin: "top left",
          position: "absolute", top: 0, left: isMobile ? -(iframeW * scaleVal * 0.05) : 0,
          pointerEvents: "none",
          opacity: loaded ? 1 : 0,
          transition: "opacity 0.6s ease"
        }}>
          <iframe
            src={appUrl}
            title={`${title} Preview`}
            width={iframeW}
            height={iframeH}
            style={{ border: "none", borderRadius: 0, background: "#fff" }}
            loading="lazy"
            onLoad={() => setLoaded(true)}
          />
        </div>
        {/* Bottom fade gradient */}
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 60, background: `linear-gradient(transparent, ${t.bg2})`, pointerEvents: "none" }} />
      </div>
    </div>
  );
}

function Portfolio() {

  // Sync data-theme attribute so CSS custom properties track React mode state
  useEffect(() => { document.documentElement.setAttribute('data-theme', mode); }, [mode]);

  useEffect(() => { const c = () => setIsMobile(window.innerWidth < 640); c(); window.addEventListener("resize", c); return () => window.removeEventListener("resize", c); }, []);
  useEffect(() => { fetch('/content/work.json').then(r => r.json()).then(data => setContent(data)).catch(() => console.error('Failed to load content')); }, []);

  // Hash routing — parse on mount
  useEffect(() => {
    const hash = window.location.hash.replace('#', '');
    if (hash === 'work') { setPage('work'); setSlug(null); }
    else if (hash.startsWith('detail/')) { setPage('detail'); setSlug(hash.split('/')[1]); }
    else if (['story', 'method', 'thesis', 'contact', 'framework', 'pattern'].includes(hash)) {
      setPage('home');
      setTimeout(() => { const el = document.getElementById(hash); if (el) el.scrollIntoView({ behavior: 'smooth' }); }, 100);
    } else { setPage('home'); setSlug(null); }
  }, []);

  // Hash routing — listen for back/forward
  useEffect(() => {
    const onHashChange = () => {
      const hash = window.location.hash.replace('#', '');
      if (hash === 'work') { setPage('work'); setSlug(null); window.scrollTo(0, 0); }
      else if (hash.startsWith('detail/')) { setPage('detail'); setSlug(hash.split('/')[1]); window.scrollTo(0, 0); }
      else if (['story', 'method', 'thesis', 'contact', 'framework', 'pattern'].includes(hash)) {
        setPage('home'); setSlug(null);
        setTimeout(() => { const el = document.getElementById(hash); if (el) el.scrollIntoView({ behavior: 'smooth' }); }, 100);
      } else { setPage('home'); setSlug(null); window.scrollTo(0, 0); }
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const go = (p, s) => {
    setPage(p); setSlug(s || null); setMobileNav(false); window.scrollTo(0, 0);
    if (p === 'home') window.location.hash = '';
    else if (p === 'detail' && s) window.location.hash = 'detail/' + s;
    else if (p === 'work') window.location.hash = 'work';
    else window.location.hash = p;
  };
  const active = allWork.find(w => w.slug === slug);

  const s = {
    page: { background: t.bg, color: t.t0, fontFamily: sans, fontSize: 16, lineHeight: 1.65, minHeight: "100vh", transition: "background 0.4s, color 0.4s" },
    container: { maxWidth: 1080, margin: "0 auto", padding: "0 24px" },
    narrow: { maxWidth: 840, margin: "0 auto" },
    section: { padding: isMobile ? "56px 20px" : "72px 24px" },
    tHero: { fontFamily: font, fontSize: "clamp(34px, 5vw, 50px)", fontWeight: 400, lineHeight: 1.15, letterSpacing: "-0.02em", color: t.t0 },
    tSection: { fontFamily: font, fontSize: "clamp(24px, 3.2vw, 32px)", fontWeight: 400, lineHeight: 1.25, letterSpacing: "-0.015em", color: t.t0, marginBottom: 12 },

    tCaption: { fontSize: 13, color: t.t2, lineHeight: 1.5 },
    divider: { maxWidth: 1080, margin: "0 auto", height: 1, background: t.border },

      {sections.map((sec, i) => <div key={sec.label}><section style={{ padding: "64px 24px" }}><div style={s.narrow}><R><span style={{ ...s.tLabel, color: i === sections.length - 1 ? t.green : t.blue }}>{sec.label}</span><p style={s.tBody}>{sec.body}</p></R></div></section>{i < sections.length - 1 && <div style={s.divider} />}</div>)}
      <div style={s.divider} />
      <section style={{ padding: "48px 24px" }}><div style={s.narrow}><div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{(item.tags || []).map(tag => <span key={tag} style={{ fontSize: 12, color: t.t2, background: t.bg2, padding: "5px 12px", borderRadius: 6 }}>{tag}</span>)}</div></div></section>
      <div style={s.divider} />
      <section style={{ padding: "64px 24px", background: t.bg1 }}><div style={{ ...s.narrow, textAlign: "center" }}>
        <R><p style={{ ...s.tBody, marginBottom: 20 }}>This case study demonstrates the prototype-first discovery methodology applied to a real enterprise challenge.</p>
        <button onClick={() => go("work")} style={{ padding: "12px 24px", background: "transparent", border: `1px solid ${t.border}`, color: t.t1, fontSize: 14, fontWeight: 500, borderRadius: 8, cursor: "pointer" }}>{"\u2190"} Back to all work</button></R>
      </div></section>
    </>);
  };

  // === RENDER ===
  return (
    <div style={s.page}>
      <Nav />
      {page === "home" && <HomePage />}
      {page === "work" && <WorkPage />}
      {page === "detail" && active && active.type === "product" && <ProductPage item={active} />}
      {page === "detail" && active && active.type === "case-study" && <CaseStudyPage item={active} />}
      <Footer />
    </div>
  );
}

ReactDOM.render(<Portfolio />, document.getElementById("root"));
</script>
</body>
</html>
