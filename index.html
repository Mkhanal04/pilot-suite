// --- SCROLL REVEAL ---
function useReveal(dep) {
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.style.opacity = "1"; e.target.style.transform = "translateY(0)"; io.unobserve(e.target); } }),
      { threshold: 0.08, rootMargin: "0px 0px -30px 0px" }
    );
    // Inline viewport check: reveal immediately if already visible, otherwise hide and observe
    document.querySelectorAll("[data-reveal]").forEach((el) => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.style.opacity = "1"; el.style.transform = "translateY(0)";
      } else {
        el.style.opacity = "0"; el.style.transform = "translateY(24px)"; io.observe(el);
      }
    });
    return () => io.disconnect();
  }, [dep]);
}

function R({ children, delay = 0, style = {} }) {
  return <div data-reveal style={{ opacity: 0, transform: "translateY(24px)", transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${delay}s`, ...style }}>{children}</div>;
}

function SectionHeader({ label, title, body, t, s, narrow }) {

}

        <div style={s.container}>
          <R delay={0.05}><div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 28 }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: `linear-gradient(135deg, ${t.blue}, ${t.green})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: "#fff", flexShrink: 0 }}>MK</div>

          </div></R>
          <R delay={0.12}><h1 style={{ ...s.tHero, maxWidth: 720 }}>I help enterprises validate AI product bets<br /><span style={{ display: "block", marginTop: 8 }}><em style={{ fontStyle: "italic", color: t.t1 }}>before they commit the engineering budget.</em></span></h1></R>
          <R delay={0.18}><div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 20, marginBottom: 20 }}>{["Healthcare", "Supply Chain", "Automotive", "Energy", "ESG"].map(ind => <span key={ind} style={{ fontSize: 11, fontFamily: mono, color: t.t2, background: t.bg2, padding: "4px 12px", borderRadius: 6, fontWeight: 500, letterSpacing: "0.04em" }}>{ind}</span>)}</div></R>
          <R delay={0.2}>
            <p style={{ ...s.tBody, marginBottom: 36, maxWidth: 640 }}>Ten years delivering enterprise products at Toyota, Dell, World Kinect, and CRC Group taught me what it takes to ship. A degree in Human-Centered AI taught me why most AI products fail after they ship. I combine both: working prototypes in weeks that let you validate the concept before committing the budget.</p>

      <div style={s.divider} />

          {[
            { year: "2015–2024", label: "Enterprise", text: "Toyota, Dell, World Kinect, CRC Group — BA, product owner, delivery lead", color: t.blue },
            { year: "2023–2025", label: "Education", text: "Texas Tech B.S. Human-Centered AI · Cornell AI Certification", color: t.amber },
            { year: "2025–now", label: "Building", text: "TradePilot (supply chain) + TalentPilot (recruiting) — same architecture, different domains", color: t.green },

      <div style={s.divider} />

      {/* WORK */}
      <section id="work" style={s.section}><div style={s.container}>
        <R><SectionHeader label="Featured Work" title="Working hypotheses you can click." body="Each prototype tests whether the same architecture holds in a new domain. Different industry, same intelligence framework. Try them." t={t} s={s} /></R>
        <div style={{ display: "flex", flexDirection: "column", gap: 20, marginTop: 32 }}>
          {allWork.filter(w => w.type === "product" && w.status === "live").map((product, i) => {
            const c = colorMap[product.color];
            return (
              <R key={product.slug} delay={i * 0.12}><div style={{ ...s.card, overflow: "hidden", cursor: "pointer", transition: "border-color 0.3s, transform 0.3s" }} onClick={() => go("detail", product.slug)} onMouseEnter={e => { e.currentTarget.style.borderColor = t.borderH; e.currentTarget.style.transform = "translateY(-3px)"; }} onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.transform = "translateY(0)"; }}>
                {/* Live app preview — stacked layout for maximum visual impact */}
                <div style={{ position: "relative" }}>
                  <LiveAppPreview appUrl={product.appUrl} t={t} color={c} isMobile={isMobile} title={product.title} />
                  {/* Domain badge overlay */}
                  <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: c, background: `${c}12`, border: `1px solid ${c}25`, padding: "4px 10px", borderRadius: 6, position: "absolute", top: 16, right: 16, zIndex: 2, backdropFilter: "blur(8px)" }}>{product.domain}</span>
                </div>
                {/* Product details below the preview */}
                <div style={{ padding: isMobile ? "20px 20px 24px" : "24px 32px 28px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <span style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.01em" }}>{product.title}</span>
                    {statusBadge(product.status)}
                  </div>
                  <p style={{ fontSize: 15, color: t.t1, lineHeight: 1.6, marginBottom: 16 }}>{product.desc}</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 20 }}>{product.tags.map(tag => <span key={tag} style={{ fontSize: 11, color: t.blue, background: t.blueS, border: `1px solid ${t.blueB}`, padding: "3px 9px", borderRadius: 5, fontWeight: 500 }}>{tag}</span>)}</div>
                  <div style={{ paddingTop: 16, borderTop: `1px solid ${t.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: t.t2 }}>{product.stats.views} views {"\u00b7"} {product.stats.agents} agents {"\u00b7"} Guided tour</span>
                    <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                      <span style={{ fontSize: 13, color: t.t1, fontWeight: 500, cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); go("detail", product.slug); }}>View details {"\u2192"}</span>
                      <a href={product.appUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{ fontSize: 13, color: t.blue, fontWeight: 500, textDecoration: "none", cursor: "pointer" }}>Try it {"\u2192"}</a>
                    </div>
                  </div>
                </div>
              </div></R>
            );
          })}
        </div>
        {/* See all work link */}
        <R delay={0.15}><div style={{ textAlign: "center", marginTop: 24 }}><span onClick={() => go("work")} style={{ fontSize: 14, color: t.blue, cursor: "pointer", fontWeight: 500 }}>View all work {"\u2192"}</span></div></R>
      </div></section>
      <div style={s.divider} />

      {/* THESIS */}
      <section id="thesis" style={s.section}><div style={{ ...s.container, display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: isMobile ? 40 : 60, alignItems: "start" }}>
        <R><div><span style={s.tLabel}>The Thesis</span><h2 style={s.tSection}>Make it cheap to find out if your product will work.</h2>
          <p style={{ ...s.tBody, marginBottom: 16 }}>Most enterprise AI products fail because the first time a real user touches working software is month six. By then the budget is committed. You're not discovering whether the product works — you're defending why it should.</p>
          <p style={{ ...s.tBody, marginBottom: 24 }}>Prototype-first discovery changes the math. Validate with working software during discovery, not after. The architecture transfers across domains. The risk drops.</p>
          <a href="mailto:milan.khanal25@gmail.com" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "12px 24px", background: t.blue, color: "#fff", fontSize: 14, fontWeight: 500, borderRadius: 8, cursor: "pointer", textDecoration: "none" }}>Book a 30-minute demo {"\u2192"}</a>
        </div></R>
        <R delay={0.1}><div style={{ ...s.card, padding: 28 }}>
          <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: t.t2, marginBottom: 20 }}>Architecture {"\u00b7"} Applied Across Domains</div>
          {[{ domain: "Supply Chain", product: "TradePilot", live: true }, { domain: "Recruiting", product: "TalentPilot", live: true }, { domain: "Healthcare", product: "HealthPilot (next)", live: false }, { domain: "Automotive", product: "AutoPilot (next)", live: false }].map((row, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 24px 1fr", alignItems: "center", padding: "12px 0", borderBottom: i < 3 ? `1px solid ${t.border}` : "none", fontSize: 14 }}>
              <span style={{ color: t.t1 }}>{row.domain}</span><span style={{ color: t.blue, textAlign: "center", fontFamily: mono, fontSize: 12 }}>{"\u2192"}</span><span style={{ color: row.live ? t.t0 : t.t2, fontWeight: row.live ? 500 : 400, textAlign: "right", fontStyle: row.live ? "normal" : "italic" }}>{row.product}</span>
            </div>
          ))}
        </div></R>
      </div></section>
      <div style={s.divider} />

      {/* CONTACT */}
      <section id="contact" style={{ ...s.section, background: t.bg1 }}><div style={{ ...s.narrow, textAlign: "center" }}>
        <R><span style={{ ...s.tLabel, textAlign: "center" }}>Get in Touch</span><h2 style={{ ...s.tSection, textAlign: "center" }}>Let's talk about your AI product bet.</h2>
          <p style={{ ...s.tBody, marginBottom: 32, textAlign: "center" }}>I help enterprises go from AI strategy to validated prototype in weeks. If you have budget but no clear product vision, let's talk.</p>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
            <a href="mailto:milan.khanal25@gmail.com" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "12px 24px", background: t.blue, color: "#fff", fontSize: 14, fontWeight: 500, borderRadius: 8, textDecoration: "none" }}>milan.khanal25@gmail.com {"\u2192"}</a>
            <a href="https://www.linkedin.com/in/milankhanal41" target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", padding: "12px 24px", border: `1px solid ${t.border}`, color: t.t1, fontSize: 14, fontWeight: 500, borderRadius: 8, textDecoration: "none" }}>LinkedIn</a>
          </div>
        </R>
      </div></section>
    </>
  );

  // === PAGE: WORK LISTING ===
  const WorkPage = () => {
    const filtered = (filter === "all" ? allWork : allWork.filter(w => filter === "products" ? w.type === "product" : w.type === "case-study")).filter(w => w.status !== "coming");
    return (
      <section style={{ padding: "120px 24px 80px" }}><div style={s.container}>
        <Breadcrumb items={[{ label: "Home", onClick: () => go("home") }, { label: "Work" }]} />
        <span style={s.tLabel}>All Work</span>
        <h1 style={{ ...s.tSection, fontSize: "clamp(28px, 4vw, 40px)", marginBottom: 8 }}>Products, case studies, and thinking.</h1>
        <p style={{ ...s.tBody, marginBottom: 32, maxWidth: 560 }}>Live prototypes, project deep-dives, and frameworks. Each piece maps back to the same architecture.</p>
        <div style={{ display: "flex", gap: 8, marginBottom: 40, flexWrap: "wrap" }}>
          {[{ k: "all", l: "All" }, { k: "products", l: "Products" }, { k: "case-studies", l: "Case Studies" }].map(f => (
            <button key={f.k} onClick={() => setFilter(f.k)} style={{ padding: "6px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500, border: `1px solid ${filter === f.k ? t.blue : t.border}`, background: filter === f.k ? t.blueS : "transparent", color: filter === f.k ? t.blue : t.t2, cursor: "pointer" }}>{f.l}</button>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: `repeat(auto-fill, minmax(${isMobile ? "280px" : "320px"}, 1fr))`, gap: 16 }}>
          {filtered.map(item => {
            const c = colorMap[item.color];
            const clickable = item.status !== "coming";
            return (
              <R key={item.slug}><div onClick={() => clickable && go("detail", item.slug)} style={{ ...s.card, padding: 0, overflow: "hidden", cursor: clickable ? "pointer" : "default", opacity: item.status === "coming" ? 0.6 : 1, transition: "border-color 0.3s, transform 0.3s" }} onMouseEnter={e => { if (clickable) { e.currentTarget.style.borderColor = t.borderH; e.currentTarget.style.transform = "translateY(-2px)"; }}} onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.transform = "translateY(0)"; }}>
                {item.type === "product" && item.status === "live" && (
                  <div style={{ height: 120, background: t.bg2, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <AppWireframe t={t} color={c} isMobile={isMobile} />
                  </div>
                )}
                <div style={{ padding: "20px 24px 24px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: c, background: `${c}12`, border: `1px solid ${c}25`, padding: "3px 8px", borderRadius: 5 }}>{item.domain}</span>
                      <span style={{ fontSize: 11, color: t.t2, background: t.bg2, padding: "3px 8px", borderRadius: 5 }}>{typeLabels[item.type] || item.type}</span>
                    </div>
                    {statusBadge(item.status)}
                  </div>
                  <div style={{ fontFamily: font, fontSize: 18, color: t.t0, marginBottom: 8 }}>{item.title}</div>
                  {item.status === "coming" && (
                    <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: t.t3, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>Prototype in progress</div>
                  )}
                  <p style={{ fontSize: 14, color: t.t1, lineHeight: 1.6, marginBottom: 16 }}>{item.summary}</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{(item.tags || []).slice(0, 4).map(tag => <span key={tag} style={{ fontSize: 11, color: t.t2, background: t.bg2, padding: "3px 8px", borderRadius: 5 }}>{tag}</span>)}</div>
                  {item.date && <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${t.border}`, fontSize: 12, color: t.t3 }}>{new Date(item.date).toLocaleDateString("en-US", { year: "numeric", month: "short" })}</div>}
                  {item.appUrl && item.status === "live" && (
                    <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${t.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 12, color: t.t2 }}>{item.stats?.views || 0} views {"\u00b7"} {item.stats?.agents || 0} agents</span>
                      <a href={item.appUrl} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{ fontSize: 12, color: t.blue, fontWeight: 500, textDecoration: "none" }}>Try it {"\u2192"}</a>
                    </div>
                  )}
                </div>
              </div></R>
            );
          })}
        </div>
      </div></section>
    );
  };

  // === PAGE: PRODUCT DETAIL ===
  const ProductPage = ({ item }) => {
    const c = colorMap[item.color];
    return (<>
      <section style={{ padding: "120px 24px 0" }}><div style={s.container}><Breadcrumb items={[{ label: "Home", onClick: () => go("home") }, { label: "Work", onClick: () => go("work") }, { label: item.title }]} /></div></section>
      <section style={{ padding: "0 24px 80px" }}><div style={s.narrow}>
        <R><div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 20, flexWrap: "wrap" }}>
          <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: c, background: `${c}12`, border: `1px solid ${c}25`, padding: "4px 10px", borderRadius: 6 }}>{item.domain}</span>
          {statusBadge(item.status)}
        </div></R>
        <R delay={0.05}><h1 style={{ fontFamily: font, fontSize: "clamp(32px, 5vw, 44px)", fontWeight: 400, lineHeight: 1.15, letterSpacing: "-0.02em", color: t.t0, marginBottom: 16 }}>{item.title}</h1></R>
        <R delay={0.1}><p style={{ ...s.tBody, fontSize: 18, marginBottom: 32 }}>{item.summary}</p></R>
        {item.appUrl && <R delay={0.15}><a href={item.appUrl} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "14px 28px", background: c, color: "#fff", fontSize: 15, fontWeight: 500, borderRadius: 8, textDecoration: "none" }}>Try {item.title} {"\u2192"}</a></R>}
      </div></section>
      <div style={s.divider} />
      <section style={{ padding: "80px 24px" }}><div style={{ ...s.container, display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 60 }}>
        <R><div><span style={s.tLabel}>The Problem</span><p style={s.tBody}>{item.problem}</p></div></R>
        <R delay={0.1}><div><span style={s.tLabel}>The Approach</span><p style={s.tBody}>{item.approach}</p></div></R>
      </div></section>
      <div style={s.divider} />
      <section style={{ padding: "80px 24px" }}><div style={s.container}>
        <R><span style={s.tLabel}>Architecture Pillars</span><h2 style={{ ...s.tSection, marginBottom: 24 }}>What's under the hood.</h2>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>{(item.pillars || []).map(p => <span key={p} style={{ fontSize: 13, color: t.t1, background: t.bg1, border: `1px solid ${t.border}`, padding: "8px 16px", borderRadius: 8, fontWeight: 500 }}>{p}</span>)}</div></R>
        <R delay={0.1}><div style={{ ...s.card, padding: "24px 28px", marginTop: 32, display: "flex", justifyContent: "space-around", textAlign: "center", flexWrap: "wrap", gap: 24 }}>
          <div><span style={{ fontFamily: font, fontSize: 28, color: t.t0, display: "block" }}>{item.stats?.views}</span><span style={{ fontSize: 12, color: t.t2 }}>Views</span></div>
          <div><span style={{ fontFamily: font, fontSize: 28, color: t.t0, display: "block" }}>{item.stats?.agents}</span><span style={{ fontSize: 12, color: t.t2 }}>AI Agents</span></div>
          <div><span style={{ fontFamily: font, fontSize: 28, color: t.t0, display: "block" }}>Yes</span><span style={{ fontSize: 12, color: t.t2 }}>Guided Tour</span></div>
        </div></R>
      </div></section>
      <div style={s.divider} />
      <section style={{ padding: "80px 24px", background: t.bg1 }}><div style={{ maxWidth: 1080, margin: "0 auto" }}>
        <R><div style={{ textAlign: "center", marginBottom: 32 }}><h2 style={{ ...s.tSection, textAlign: "center" }}>See it in action.</h2>
        <p style={{ ...s.tBody, textAlign: "center" }}>This is a working prototype with a guided tour. Click through the full decision lifecycle.</p></div></R>
        {item.appUrl && <R delay={0.1}><div style={{ ...s.card, overflow: "hidden", borderRadius: 16 }}>
          <LiveAppPreview appUrl={item.appUrl} t={t} color={c} isMobile={isMobile} title={item.title} />
          <div style={{ padding: "20px 28px", textAlign: "center", borderTop: `1px solid ${t.border}` }}>
            <a href={item.appUrl} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "14px 28px", background: c, color: "#fff", fontSize: 15, fontWeight: 500, borderRadius: 8, textDecoration: "none" }}>Launch {item.title} {"\u2192"}</a>
          </div>
        </div></R>}
      </div></section>
    </>);
  };

  // === PAGE: CASE STUDY ===
  const CaseStudyPage = ({ item }) => {
    const c = colorMap[item.color];
    const sections = [{ label: "Context", body: item.context }, { label: "The Problem", body: item.problem }, { label: "The Approach", body: item.approach }, { label: "The Outcome", body: item.outcome }, { label: "What I Learned", body: item.learnings }].filter(s => s.body);
    return (<>
      <section style={{ padding: "120px 24px 0" }}><div style={s.container}><Breadcrumb items={[{ label: "Home", onClick: () => go("home") }, { label: "Work", onClick: () => go("work") }, { label: item.title }]} /></div></section>
      <section style={{ padding: "0 24px 60px" }}><div style={s.narrow}>
        <R><div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 20, flexWrap: "wrap" }}>
          <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: c, background: `${c}12`, border: `1px solid ${c}25`, padding: "4px 10px", borderRadius: 6 }}>{item.domain}</span>
          <span style={{ fontSize: 11, color: t.t2, background: t.bg2, padding: "3px 8px", borderRadius: 5 }}>Case Study</span>
          {item.date && <span style={{ fontSize: 12, color: t.t3 }}>{new Date(item.date).toLocaleDateString("en-US", { year: "numeric", month: "long" })}</span>}
        </div></R>
        <R delay={0.05}><h1 style={{ fontFamily: font, fontSize: "clamp(32px, 5vw, 44px)", fontWeight: 400, lineHeight: 1.15, letterSpacing: "-0.02em", color: t.t0, marginBottom: 16 }}>{item.title}</h1></R>
        <R delay={0.1}><p style={{ ...s.tBody, fontSize: 18 }}>{item.summary}</p></R>
      </div></section>
      <div style={s.divider} />
      {sections.map((sec, i) => <div key={sec.label}><section style={{ padding: "64px 24px" }}><div style={s.narrow}><R><span style={{ ...s.tLabel, color: i === sections.length - 1 ? t.green : t.blue }}>{sec.label}</span><p style={s.tBody}>{sec.body}</p></R></div></section>{i < sections.length - 1 && <div style={s.divider} />}</div>)}
      <div style={s.divider} />
      <section style={{ padding: "48px 24px" }}><div style={s.narrow}><div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{(item.tags || []).map(tag => <span key={tag} style={{ fontSize: 12, color: t.t2, background: t.bg2, padding: "5px 12px", borderRadius: 6 }}>{tag}</span>)}</div></div></section>
      <div style={s.divider} />
      <section style={{ padding: "64px 24px", background: t.bg1 }}><div style={{ ...s.narrow, textAlign: "center" }}>
        <R><p style={{ ...s.tBody, marginBottom: 20 }}>This case study demonstrates the prototype-first discovery methodology applied to a real enterprise challenge.</p>
        <button onClick={() => go("work")} style={{ padding: "12px 24px", background: "transparent", border: `1px solid ${t.border}`, color: t.t1, fontSize: 14, fontWeight: 500, borderRadius: 8, cursor: "pointer" }}>{"\u2190"} Back to all work</button></R>
      </div></section>
    </>);
  };

  // === RENDER ===
  return (
    <div style={s.page}>
      <Nav />
      {page === "home" && <HomePage />}
      {page === "work" && <WorkPage />}
      {page === "detail" && active && active.type === "product" && <ProductPage item={active} />}
      {page === "detail" && active && active.type === "case-study" && <CaseStudyPage item={active} />}
      <Footer />
    </div>
  );
}

ReactDOM.render(<Portfolio />, document.getElementById("root"));
</script>
</body>
