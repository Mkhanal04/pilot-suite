<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Chatbot Admin · Milan Khanal</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: #FAFAFA; color: #18181B;
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: #2563EB; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header {
    background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header .status { font-size: 13px; color: #71717A; font-family: 'JetBrains Mono', monospace; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px; display: grid; gap: 24px; }
  .card {
    background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px;
    padding: 24px;
  }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #18181B; }
  .row { display: grid; grid-template-columns: 200px 1fr auto; gap: 16px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .row:last-child { border-bottom: none; }
  .row label { font-size: 13px; font-weight: 500; color: #3F3F46; }
  .row .desc { font-size: 12px; color: #71717A; margin-top: 2px; }
  .row input[type="text"], .row input[type="number"], .row select, .row textarea {
    width: 100%; padding: 8px 12px; border: 1px solid rgba(0,0,0,0.14);
    border-radius: 6px; font-family: inherit; font-size: 14px; background: #FAFAFA;
  }
  .row textarea { min-height: 90px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .row input:focus, .row select:focus, .row textarea:focus { outline: 2px solid #2563EB; outline-offset: 1px; border-color: #2563EB; }
  button {
    padding: 8px 16px; border: 1px solid rgba(0,0,0,0.14); background: #fff;
    border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; color: #18181B;
  }
  button:hover { background: #F4F4F5; }
  button.primary { background: #18181B; color: #fff; border-color: #18181B; }
  button.primary:hover { background: #3F3F46; }
  button.danger { color: #DC2626; border-color: rgba(220,38,38,0.3); }
  button.danger:hover { background: #FEE2E2; }
  .toggle {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
  }
  .toggle-pill {
    width: 40px; height: 22px; background: #D4D4D8; border-radius: 11px; position: relative; transition: background 0.2s;
  }
  .toggle-pill::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
    background: #fff; border-radius: 50%; transition: transform 0.2s;
  }
  .toggle input { display: none; }
  .toggle input:checked + .toggle-pill { background: #16A34A; }
  .toggle input:checked + .toggle-pill::after { transform: translateX(18px); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  th { font-weight: 600; color: #71717A; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; background: #FAFAFA; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #F4F4F5; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .pill.refuse { background: #FEE2E2; color: #991B1B; }
  .pill.ok { background: #DCFCE7; color: #166534; }
  .empty { text-align: center; padding: 32px; color: #A1A1AA; font-size: 13px; }
  .drawer {
    position: fixed; top: 0; right: 0; width: 720px; max-width: 100vw;
    height: 100vh; background: #fff; box-shadow: -20px 0 40px rgba(0,0,0,0.12);
    transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    z-index: 100; overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 20px 28px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; }
  .drawer-body { padding: 20px 28px; }
  .msg-block { padding: 14px 16px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
  .msg-user { background: #F4F4F5; }
  .msg-assistant { background: #EFF6FF; border: 1px solid rgba(37,99,235,0.12); }
  .msg-meta { font-size: 11px; color: #A1A1AA; font-family: 'JetBrains Mono', monospace; margin-top: 6px; }
  .saving { color: #2563EB; font-size: 12px; margin-left: 8px; }
  .saved { color: #16A34A; font-size: 12px; margin-left: 8px; }
  .err { color: #DC2626; font-size: 12px; margin-left: 8px; }
  @media (max-width: 720px) {
    .row { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    .wrap { padding: 16px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>Chatbot Admin</h1>
  <span class="status" id="status">loading...</span>
</header>
<div class="wrap">

  <section class="card">
    <h2>Kill switch & voice</h2>
    <div id="config-panel"></div>
  </section>

  <section class="card">
    <h2>Recent conversations</h2>
    <div id="conversations-panel"></div>
  </section>

  <section class="card">
    <h2>Refuse events</h2>
    <div id="refuses-panel"></div>
  </section>

</div>

<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <h2 id="drawer-title">Conversation</h2>
    <button onclick="closeDrawer()">Close</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script>
const MODELS = [
  { value: 'claude-sonnet-4-6', label: 'Claude Sonnet 4.6 (recommended, natural voice)' },
  { value: 'claude-opus-4-7',   label: 'Claude Opus 4.7 (premium, slower)' },
  { value: 'claude-haiku-4-5',  label: 'Claude Haiku 4.5 (fastest, cheapest)' }
];

const CONFIG_UI = [
  { key: 'chatbot_enabled',        label: 'Chatbot enabled',      type: 'toggle', desc: 'Master kill switch. Off = widget returns "offline" message.' },
  { key: 'active_model',           label: 'Active model',         type: 'select', options: MODELS, desc: 'Model used to generate replies.' },
  { key: 'refuse_template',        label: 'Refuse template',      type: 'text',   desc: 'Exact text used when no match or the bot refuses.' },
  { key: 'system_prompt_additions',label: 'System prompt add-on', type: 'textarea', desc: 'Appended to the base system prompt. Use for voice reminders, new positioning, or temporary nudges.' },
  { key: 'max_messages_per_hour',  label: 'Rate limit / hour',    type: 'number', desc: 'Per-session message cap per rolling hour.' },
  { key: 'similarity_threshold',   label: 'Similarity threshold', type: 'number', step: 0.05, desc: 'Cosine similarity floor for RAG matches. Higher = stricter.' },
  { key: 'top_k',                  label: 'Top-K retrieved',      type: 'number', desc: 'Max chunks retrieved per query.' }
];

function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: 'include', ...opts });
  if (res.status === 401) {
    document.getElementById('status').textContent = 'unauthorized';
    throw new Error('Unauthorized');
  }
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

let configState = {};

async function loadConfig() {
  const { config } = await api('/api/admin/config');
  configState = config;
  renderConfig();
  document.getElementById('status').textContent = 'connected';
}

function renderConfig() {
  const panel = document.getElementById('config-panel');
  panel.innerHTML = '';
  for (const item of CONFIG_UI) {
    const current = configState[item.key]?.value;
    const row = el('div', { class: 'row' });
    const left = el('div', {},
      el('div', {}, el('label', {}, item.label)),
      el('div', { class: 'desc' }, item.desc || '')
    );
    row.appendChild(left);

    let input;
    if (item.type === 'toggle') {
      const on = current === true || current === 'true';
      const checkbox = el('input', { type: 'checkbox' });
      if (on) checkbox.setAttribute('checked', 'checked');
      checkbox.addEventListener('change', e => saveConfig(item.key, e.target.checked, status));
      input = el('label', { class: 'toggle' }, checkbox, el('span', { class: 'toggle-pill' }));
    } else if (item.type === 'select') {
      input = el('select');
      for (const opt of item.options) {
        const o = el('option', { value: opt.value }, opt.label);
        if (opt.value === current) o.setAttribute('selected', 'selected');
        input.appendChild(o);
      }
      input.addEventListener('change', e => saveConfig(item.key, e.target.value, status));
    } else if (item.type === 'textarea') {
      input = el('textarea', { placeholder: 'Optional extra voice / positioning rules...' });
      input.value = current ?? '';
      input.addEventListener('blur', e => saveConfig(item.key, e.target.value, status));
    } else if (item.type === 'number') {
      input = el('input', { type: 'number', step: item.step || 1 });
      input.value = current ?? '';
      input.addEventListener('blur', e => saveConfig(item.key, parseFloat(e.target.value), status));
    } else {
      input = el('input', { type: 'text' });
      input.value = current ?? '';
      input.addEventListener('blur', e => saveConfig(item.key, e.target.value, status));
    }

    const status = el('span', { class: '' });
    row.appendChild(input);
    row.appendChild(status);
    panel.appendChild(row);
  }
}

async function saveConfig(key, value, statusEl) {
  statusEl.className = 'saving';
  statusEl.textContent = 'saving...';
  try {
    await api('/api/admin/config', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value })
    });
    statusEl.className = 'saved';
    statusEl.textContent = 'saved';
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = ''; }, 1800);
  } catch (err) {
    statusEl.className = 'err';
    statusEl.textContent = 'error';
  }
}

async function loadConversations() {
  const { conversations } = await api('/api/admin/conversations?limit=30');
  const panel = document.getElementById('conversations-panel');
  panel.innerHTML = '';
  if (conversations.length === 0) {
    panel.appendChild(el('div', { class: 'empty' }, 'No conversations yet.'));
    return;
  }
  const table = el('table');
  table.appendChild(el('thead', {},
    el('tr', {},
      el('th', {}, 'Session'),
      el('th', {}, 'Messages'),
      el('th', {}, 'Refuses'),
      el('th', {}, 'Email'),
      el('th', {}, 'Last active')
    )
  ));
  const tbody = el('tbody');
  for (const c of conversations) {
    const tr = el('tr', { onclick: () => openConversation(c.session_id) });
    tr.appendChild(el('td', {}, el('code', {}, c.session_id.slice(0, 8))));
    tr.appendChild(el('td', {}, String(c.message_count)));
    tr.appendChild(el('td', {}, c.refuse_count > 0
      ? el('span', { class: 'pill refuse' }, String(c.refuse_count))
      : String(0)));
    tr.appendChild(el('td', {}, c.optional_email || '-'));
    tr.appendChild(el('td', {}, new Date(c.last_active_at).toLocaleString()));
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  panel.appendChild(table);
}

async function loadRefuses() {
  const { refuses } = await api('/api/admin/refuses?limit=30');
  const panel = document.getElementById('refuses-panel');
  panel.innerHTML = '';
  if (refuses.length === 0) {
    panel.appendChild(el('div', { class: 'empty' }, 'No refuse events yet.'));
    return;
  }
  for (const r of refuses) {
    const block = el('div', { class: 'msg-block msg-assistant', onclick: () => openConversation(r.session_id) });
    block.style.cursor = 'pointer';
    if (r.user_question) {
      block.appendChild(el('div', { class: 'msg-meta' }, 'User asked:'));
      block.appendChild(el('div', { html: escapeHtml(r.user_question) }));
      block.appendChild(el('div', { class: 'msg-meta' }, 'Bot refused with:'));
    }
    block.appendChild(el('div', { html: escapeHtml(r.content) }));
    block.appendChild(el('div', { class: 'msg-meta' },
      `${new Date(r.created_at).toLocaleString()} · tier=${r.tier || 'n/a'} · session ${r.session_id.slice(0,8)}`
    ));
    panel.appendChild(block);
  }
}

async function openConversation(sessionId) {
  const { conversation, messages, documents } = await api(`/api/admin/conversation?session_id=${encodeURIComponent(sessionId)}`);
  const drawer = document.getElementById('drawer');
  document.getElementById('drawer-title').textContent = `Session ${sessionId.slice(0, 12)}`;
  const body = document.getElementById('drawer-body');
  body.innerHTML = '';
  body.appendChild(el('div', { class: 'msg-meta' },
    `Started ${new Date(conversation.started_at).toLocaleString()} · ${messages.length} messages · ${conversation.optional_email || 'no email'}`
  ));
  for (const m of messages) {
    const block = el('div', { class: 'msg-block ' + (m.role === 'user' ? 'msg-user' : 'msg-assistant') });
    block.appendChild(el('div', { html: escapeHtml(m.content).replace(/\n/g, '<br>') }));
    const meta = [];
    meta.push(new Date(m.created_at).toLocaleTimeString());
    if (m.model) meta.push(m.model);
    if (m.latency_ms) meta.push(`${m.latency_ms}ms`);
    if (m.tokens_in) meta.push(`${m.tokens_in}in/${m.tokens_out}out`);
    if (m.refuse_flag) meta.push('REFUSED');
    block.appendChild(el('div', { class: 'msg-meta' }, meta.join(' · ')));
    if (m.retrieved_source_ids && m.retrieved_source_ids.length > 0) {
      const srcs = m.retrieved_source_ids.map(id => documents[id]?.source_path || id).join(', ');
      block.appendChild(el('div', { class: 'msg-meta' }, `retrieved: ${srcs}`));
    }
    body.appendChild(block);
  }
  drawer.classList.add('open');
  drawer.setAttribute('aria-hidden', 'false');
}

function closeDrawer() {
  const d = document.getElementById('drawer');
  d.classList.remove('open');
  d.setAttribute('aria-hidden', 'true');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

(async function init() {
  try {
    await loadConfig();
    await loadConversations();
    await loadRefuses();
  } catch (err) {
    document.getElementById('status').textContent = err.message || 'error';
  }
  setInterval(() => { loadConversations().catch(()=>{}); loadRefuses().catch(()=>{}); }, 30000);
})();
</script>
</body>
</html>
